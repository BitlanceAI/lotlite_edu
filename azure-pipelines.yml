trigger:
  - main

variables:
  - name: dockerRegistryServiceConnection
    value: 'acr-service-connection-lotlite'
  - name: imageRepositoryBackend
    value: 'lotlite-backend'
  - name: imageRepositoryFrontend
    value: 'lotlite-frontend'
  - name: containerRegistry
    value: 'bitlanceaiapp.azurecr.io'
  - name: dockerfilePathBackend
    value: '$(Build.SourcesDirectory)/backend/Dockerfile'
  - name: dockerfilePathFrontend
    value: '$(Build.SourcesDirectory)/frontend/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: Build and Push Stage
    jobs:
      - job: BuildAndPush
        displayName: Build and Push Images
        pool:
          vmImage: $(vmImageName)
        steps:
          # 1. Build Frontend
          - task: Docker@2
            displayName: "Build Frontend"
            inputs:
              command: build
              repository: $(imageRepositoryFrontend)
              dockerfile: $(dockerfilePathFrontend)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
              arguments: '--build-arg NEXT_PUBLIC_SUPABASE_URL=$(NEXT_PUBLIC_SUPABASE_URL) --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$(NEXT_PUBLIC_SUPABASE_ANON_KEY) --build-arg NEXT_PUBLIC_BACKEND_URL=$(NEXT_PUBLIC_BACKEND_URL)'

          # 1b. Push Frontend
          - task: Docker@2
            displayName: "Push Frontend"
            inputs:
              command: push
              repository: $(imageRepositoryFrontend)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

          # 2. Build & Push Backend
          - task: Docker@2
            displayName: "Build & Push Backend"
            inputs:
              command: buildAndPush
              repository: $(imageRepositoryBackend)
              dockerfile: $(dockerfilePathBackend)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
